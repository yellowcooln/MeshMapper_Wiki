# Theme Configuration
theme:
  name:  material
  logo: assets/wardrive.png
  favicon: assets/wardrive.png
  palette:
    scheme: slate

# Markdown Extensions
markdown_extensions:
  - attr_list
  - admonition
  - md_in_html
  - pymdownx.blocks.caption
  - toc:
      permalink: true

# Plugins
plugins:
  - search
  - macros
  - glightbox:
      touchNavigation: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js
